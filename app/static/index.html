<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Главная страница</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      margin-top: 0;
    }

    p {
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Добро пожаловать</h1>
    <p>Страница открыта. Посещение автоматически зафиксировано.</p>
  </div>

  <script>
    async function registerVisit() {
      try {
        await fetch("/visit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          }
        });
      } catch (error) {
        console.error("Ошибка при отправке посещения:", error);
      }
    }

    registerVisit();
  </script>
</body>
</html>
